<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelNest – Destination Explorer</title>
    <link rel="icon" href="images/favicon.png" type="image/png">
    <link rel="shortcut icon" href="images/favicon.png" type="image/png">
    <link rel="stylesheet" href="Destination-Explorer.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0e0769">

</head>
<body>

    <!--  nav bar start -->
        <nav class="navbar">
            <div class="logo">
                 <a href="Index.html">
                    <img src="images/TravelNest.png" alt="TravelNest Logo">
                </a>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="Index.html">Home</a></li>
                <li><a href="Destination-Explorer.html" class="active">Destination Explorer</a></li>
                <li><a href="Trip-Budget-Planner.html">Trip Budget Planner</a></li>
                <li><a href="Random-Trip-Generator.html">Random Trip Generator</a></li>
                <li><a href="Travel-Mood.html">Travel Mood</a></li>
                <li><a href="Feedback.html"">Feedback</a></li>
            </ul>

            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
        </nav>
    <!--  nav bar end -->
      
    <main>
        <h2>Explore Destinations</h2>

        <div class="filters">
            <input type="text" id="searchName" placeholder="Search by name...">
            <select id="filterContinent">
                <option value="all">All Continents</option>
                <option value="Asia">Asia</option>
                <option value="Africa">Africa</option>
                <option value="North America">North America</option>
                <option value="South America">South America</option>
                <option value="Antarctica">Antarctica</option>
                <option value="Europe">Europe</option>
                <option value="Australia">Australia</option>
            </select>
        </div>

        <div id="destination-grid" class="card-container">
            </div>

        <div id="destination-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <div id="modal-details"></div>
            </div>
        </div>
    </main>

  <!-- Footer Start -->
    <footer class="footer">
    
    <div class="footer-links">
        <a href="Index.html">Home</a>
        <a href="Destination-Explorer.html">Destinations</a>
        <a href="Trip-Budget-Planner.html">Trip Planner</a>
        <a href="Random-Trip-Generator.html">Random Trip</a>
        <a href="Travel-Mood.html">Travel Mood</a>
        <a href="Feedback.html">Feedback</a>
    </div>

      <!-- Newsletter Form -->
    <form id="newsletter-form">
        <h3>Subscribe to our Newsletter</h3>
        <label for="newsletterEmail" class="sr-only">Email Address</label>
        <input type="email" id="newsletterEmail" placeholder="Enter your email" required>
        <button type="submit">Subscribe</button>
    </form>

      <!-- Newsletter Popup -->
      <div id="newsletter-popup" class="popup">
        <p>Thank you for subscribing!</p>
      </div>

      <p class="copyright">
        &copy; 2026 TravelNest. All Rights Reserved.
    </p>
    </footer>
  <!-- Footer End -->

    <script src="Destination-Explorer.js"></script>
</body>
</html>
